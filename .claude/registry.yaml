# AI OS Integration Registry
# Backstage-style catalog of all MCPs, APIs, Skills, and allowed web domains
# Source of truth — edit this file to add/remove/update integrations
# Viewer: python ~/.claude/registry.py [--filter type] [--search name]
#
# Status values: active | available | inactive | blocked
# Types: mcp | api | skill | web_domain

meta:
  version: "1.0.0"
  updated: "2026-04-02"
  owner: "Lead Orchestrator / CEO"

# ─────────────────────────────────────────────
# MCP SERVERS
# ─────────────────────────────────────────────
mcps:
  - name: playwright
    description: Headless browser automation. Screenshots, web interaction, scraping, vision-based page tasks.
    status: active
    config_file: "~/.mcp.json"
    command: "npx @playwright/mcp@latest --headless"
    agents_using:
      - Dir-BrowserOps
    tools:
      - browser_navigate
      - browser_screenshot
      - browser_click
      - browser_type
      - browser_evaluate
    tags: [browser, automation, scraping, vision]

  - name: filesystem
    description: Read/write access to C:/Users/atank. Used for file operations within the home directory.
    status: active
    config_file: "~/.mcp.json"
    command: "npx @modelcontextprotocol/server-filesystem C:/Users/atank"
    agents_using:
      - CTO-Engineering
      - builder
      - scout
    tools:
      - read_file
      - write_file
      - list_directory
      - create_directory
      - move_file
      - search_files
    tags: [filesystem, files, local]

  - name: claude.ai Hugging Face
    description: HuggingFace Hub access — paper search, model/repo search, space search, doc fetch, image generation.
    status: active
    config_file: "claude.ai connector"
    credentials: "HF_TOKEN (optional — anonymous rate limits apply)"
    agents_using:
      - CIRO-Research
      - Dir-TechResearch
      - Dir-ScientificResearch
      - Dir-AI-Research
      - Sr-TechResearcher
      - Research-Scientist
      - Principal-Researcher
      - Innovation-Engineer
      - Head-InnovationLab
    tools:
      - paper_search
      - hub_repo_search
      - hub_repo_details
      - space_search
      - hf_doc_search
      - hf_doc_fetch
      - gr1_z_image_turbo_generate
      - hf_whoami
    tags: [ai, research, models, papers, huggingface]

  - name: claude.ai Invideo
    description: AI video generation from scripts. Produces video content from structured prompts.
    status: active
    config_file: "claude.ai connector"
    agents_using:
      - Dir-MusicProduction
    tools:
      - generate-video-from-script
    tags: [video, generation, media]

  # ── Available plugins (installed but not activated) ──
  - name: supabase
    description: Supabase database operations — query, insert, update Postgres tables directly from Claude.
    status: available
    config_file: "~/.claude/plugins/marketplaces/claude-plugins-official/external_plugins/supabase/.mcp.json"
    credentials: "SUPABASE_URL + SUPABASE_ANON_KEY (not yet configured)"
    agents_using: []
    tags: [database, postgres, backend, planned]

  - name: github
    description: GitHub API — repos, PRs, issues, code search, actions.
    status: available
    config_file: "~/.claude/plugins/marketplaces/claude-plugins-official/external_plugins/github/.mcp.json"
    credentials: "GITHUB_TOKEN (not yet configured)"
    agents_using: []
    tags: [git, code, collaboration]

  - name: slack
    description: Slack messaging — send messages, read channels, manage workspace.
    status: available
    config_file: "~/.claude/plugins/marketplaces/claude-plugins-official/external_plugins/slack/.mcp.json"
    credentials: "SLACK_BOT_TOKEN (not yet configured)"
    agents_using: []
    tags: [messaging, communication]

  - name: linear
    description: Linear project management — issues, projects, cycles, roadmaps.
    status: available
    config_file: "~/.claude/plugins/marketplaces/claude-plugins-official/external_plugins/linear/.mcp.json"
    credentials: "LINEAR_API_KEY (not yet configured)"
    agents_using: []
    tags: [project-management, issues]

  - name: stripe
    description: Stripe payments — customers, subscriptions, invoices, payment intents.
    status: available
    config_file: "~/.claude/plugins/marketplaces/claude-plugins-official/external_plugins/stripe/.mcp.json"
    credentials: "STRIPE_API_KEY (not yet configured)"
    agents_using: []
    tags: [payments, billing]

  - name: firebase
    description: Firebase/Firestore — real-time database, authentication, storage.
    status: available
    config_file: "~/.claude/plugins/marketplaces/claude-plugins-official/external_plugins/firebase/.mcp.json"
    credentials: "FIREBASE_SERVICE_ACCOUNT (not yet configured)"
    agents_using: []
    tags: [database, realtime, google]

  - name: context7
    description: Context7 — up-to-date library docs and code examples fetched at query time.
    status: available
    config_file: "~/.claude/plugins/marketplaces/claude-plugins-official/external_plugins/context7/.mcp.json"
    credentials: "none required"
    agents_using: []
    tags: [docs, libraries, context]

  - name: asana
    description: Asana task management — projects, tasks, workflows.
    status: available
    config_file: "~/.claude/plugins/marketplaces/claude-plugins-official/external_plugins/asana/.mcp.json"
    credentials: "ASANA_ACCESS_TOKEN (not yet configured)"
    agents_using: []
    tags: [project-management, tasks]

# ─────────────────────────────────────────────
# EXTERNAL APIs
# ─────────────────────────────────────────────
apis:
  - name: LangSmith
    description: LLM observability — traces, evals, latency, cost per chain. Receives agent task strings + token metadata.
    status: active
    provider: LangChain Inc.
    credentials:
      env_var: LANGCHAIN_API_KEY
      location: "~/.claude/settings.local.json (env block)"
      note: "Key currently REDACTED — must be re-provided to re-activate"
    config:
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_PROJECT: "ai-os"
    data_leaves_machine: true
    data_sent: "Agent task strings, token counts, latency, chain structure"
    agents_using:
      - chain.py
      - run.py
    tags: [observability, tracing, llm, langchain]

  - name: Telegram (Kiriko Bot)
    description: Personal Telegram bot for notifications. Used by /notify skill and gaming-update skill to push alerts to phone.
    status: active
    provider: Telegram
    credentials:
      location: "~/.claude/kiriko.log (bot config)"
      note: "Token stored in kiriko_bot.py or env"
    agents_using:
      - notify skill
      - gaming-update skill
      - Dir-Gaming
    tags: [notifications, messaging, bot, telegram]

  - name: Suno AI
    description: AI music generation. Receives structured song prompts from /news-song skill. Output is copy-paste to Suno web UI — no direct API integration yet.
    status: manual
    provider: Suno AI
    credentials: "none (web UI only)"
    data_leaves_machine: false
    agents_using:
      - Dir-MusicProduction
      - Suno-Prompter
      - news-song skill
    tags: [music, ai, generation, creative]

  - name: Supabase
    description: Postgres cloud database for AI OS persistence. Planned replacement for SQLite state files.
    status: planned
    provider: Supabase Inc.
    credentials:
      env_vars:
        - SUPABASE_URL
        - SUPABASE_ANON_KEY
        - SUPABASE_SERVICE_ROLE_KEY
      location: "~/.claude/.env (not yet created)"
    data_leaves_machine: true
    data_sent: "Agent execution logs, session notes, resource tracking, job history"
    agents_using: []
    tags: [database, postgres, persistence, planned]

  - name: Vercel
    description: Next.js hosting for AI OS dashboard. Planned deployment target for the integration registry UI + agent history dashboard.
    status: planned
    provider: Vercel Inc.
    credentials:
      env_var: VERCEL_TOKEN
      location: "not yet configured"
    agents_using: []
    tags: [hosting, frontend, dashboard, planned]

  - name: Anthropic API
    description: Core Claude API powering all agents. Accessed via Claude Code CLI — not direct API calls.
    status: active
    provider: Anthropic
    credentials:
      location: "Claude Code OAuth (managed by Claude Code)"
    data_leaves_machine: true
    data_sent: "All prompts, agent outputs, tool results"
    agents_using: ["all agents"]
    tags: [llm, core, claude, anthropic]

  - name: Ollama (local)
    description: Local LLM inference. 13 models installed. Used by Local-Model-Router for Tier 0 tasks to save API tokens.
    status: active
    provider: local
    credentials: "none (local)"
    data_leaves_machine: false
    models:
      with_tools: [llama3.2:3b, llama3.1:latest, qwen2.5-coder:7b, deepseek-coder-v2:16b]
      without_tools: [gemma3:1b, gemma3:4b, gemma3:latest, deepseek-r1:latest, mistral:7b, phi3:medium]
    agents_using:
      - Local-Model-Router
    tags: [llm, local, ollama, cost-saving]

